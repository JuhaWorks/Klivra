<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Accessibility: allow user scaling (Lighthouse flags maximum-scale=1 as a11y issue) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Klivra — Modern project management and team collaboration platform. Manage projects, tasks, and your team in real time." />

  <!-- Strict Content Security Policy (Prevents unauthorized data exfiltration) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:* https://localhost:* ws://localhost:* wss://localhost:* http://127.0.0.1:* https://127.0.0.1:* wss://syncforge-io.onrender.com https://syncforge-io.onrender.com https://*.sentry.io https://sentry.io https://api.nasa.gov https://api.fontshare.com https://cdn.fontshare.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' blob: https://api.fontshare.com https://cdn.fontshare.com; font-src 'self' data: https://cdn.fontshare.com; worker-src 'self' blob: data:; img-src 'self' data: blob: *; media-src 'self' data: blob:; object-src 'none'; frame-src 'self' *;" />
  
  <!-- Prod Security: Disable React DevTools -->
  <script>
    if (typeof window.__REACT_DEVTOOLS_GLOBAL_HOOK__ === 'object') {
      window.__REACT_DEVTOOLS_GLOBAL_HOOK__.inject = function() {};
    }
  </script>

  <!-- Preconnect to font CDN early (critical render path) -->
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>

  <!-- Fontshare: non-blocking font load -->
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,600,500,400&f[]=switzer@700,600,500,400,300&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,600,500,400&f[]=switzer@700,600,500,400,300&display=swap"></noscript>

  <!-- Logo: preload at actual display size (40x40), not 640x640 -->
  <link rel="icon" type="image/png" href="/logo.png?v=2">

  <title>• KLIVRA •</title>
  <style>
    :root {
      --bg-base: #080812;
      --text-primary: #ffffff;
      --accent-500: #00e5a0;
    }
    body {
      background-color: #080812;
      margin: 0;
      font-family: 'Switzer', system-ui, sans-serif;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }
    /* Critical Hero Styles */
    .h-root h1 {
      font-size: clamp(1.875rem, 0.4545rem + 7.1023vw, 3.75rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.1;
      margin: 0;
    }
    @media (min-width: 640px) { .h-root h1 { font-size: 3rem; } }
    @media (min-width: 1024px) { .h-root h1 { font-size: 3.75rem; } }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body>
  <!-- SVG Filter for Glass Distortion -->
  <svg style="display: none">
    <filter id="glass-distortion">
      <feTurbulence type="turbulence" baseFrequency="0.008" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="77" />
    </filter>
  </svg>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
